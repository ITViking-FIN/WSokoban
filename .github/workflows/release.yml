# Build WSokoban.exe on a Windows runner, optionally sign it via
# SignPath.io, and attach it to a GitHub release.
#
# Triggers:
#   - push of a tag matching v*.*.*  (the normal release path)
#   - manual workflow_dispatch        (for testing without a tag)
#
# Signing
# -------
# This workflow signs the .exe via SignPath if four repository secrets
# are present. Until they are, the workflow still runs and produces an
# unsigned .exe — useful while waiting for SignPath approval.
#
# To enable signing once SignPath is approved:
#   Settings -> Secrets and variables -> Actions -> add:
#     SIGNPATH_API_TOKEN     -- token from SignPath's "API Tokens" page
#     SIGNPATH_ORG_ID        -- GUID, "Organization Settings"
#     SIGNPATH_PROJECT_SLUG  -- the project slug you chose at apply time
#     SIGNPATH_POLICY_SLUG   -- the signing-policy slug (e.g. "release-signing")
#
# See: https://about.signpath.io/documentation/build-system-integration/

name: Build and release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write       # create releases / upload assets
  id-token: write       # SignPath uses OIDC to verify the build provenance

jobs:
  build:
    runs-on: windows-latest

    env:
      # Surfaced as plain env so we can test for it inside `if:` — direct
      # `secrets.X != ''` checks aren't allowed in conditional expressions.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame-ce pyinstaller pillow

      # UPX is GPL but freely redistributable; we don't ship it, just use
      # it at build time. Keeps the .exe at ~12 MB instead of ~15 MB.
      - name: Install UPX
        shell: pwsh
        run: |
          $url = 'https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-win64.zip'
          Invoke-WebRequest -Uri $url -OutFile upx.zip
          Expand-Archive -Path upx.zip -DestinationPath .
          Copy-Item -Path 'upx-5.1.1-win64\upx.exe' -Destination .
          .\upx.exe --version

      - name: Build WSokoban.exe
        shell: pwsh
        run: |
          $env:Path = "$pwd;$env:Path"
          python -m PyInstaller WSokoban.spec --noconfirm --clean
          Get-Item dist\WSokoban.exe | Format-Table Name, Length

      - name: Upload unsigned build (always, for inspection)
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: WSokoban-unsigned
          path: dist/WSokoban.exe
          if-no-files-found: error
          retention-days: 14

      # ---- Signing ------------------------------------------------------
      - name: Submit signing request to SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-signed

      # ---- Pick the right .exe (signed if available, unsigned fallback)
      - name: Resolve release artifact
        id: artifact
        shell: pwsh
        run: |
          if (Test-Path 'dist-signed\WSokoban.exe') {
            $exe = (Resolve-Path 'dist-signed\WSokoban.exe').Path
            $signed = 'true'
          } else {
            $exe = (Resolve-Path 'dist\WSokoban.exe').Path
            $signed = 'false'
          }
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $exe).Length
          "exe=$exe"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "hash=$hash"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "signed=$signed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "size=$size"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Selected: $exe"
          Write-Host "Signed:   $signed"
          Write-Host "SHA-256:  $hash"
          Write-Host "Size:     $size bytes"

      # ---- Create the GitHub release (only on tag push) -----------------
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.exe }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Download

            **`WSokoban.exe`** — ${{ steps.artifact.outputs.size }} bytes

            **SHA-256:** `${{ steps.artifact.outputs.hash }}`
            **Signed:** ${{ steps.artifact.outputs.signed }}

            Verify locally:
            ```powershell
            Get-FileHash .\WSokoban.exe -Algorithm SHA256
            ```
